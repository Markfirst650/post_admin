<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>post_admin</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    if (localStorage.getItem('post-admin-theme') === 'dark') {
      document.documentElement.classList.add('dark');
    }
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5efe6;
      --ink: #1e2430;
      --panel: rgba(255, 251, 245, 0.82);
      --panel-border: rgba(78, 61, 46, 0.12);
      --accent: #0f766e;
      --accent-2: #9a3412;
    }

    .dark {
      color-scheme: dark;
      --bg: #0f172a;
      --ink: #e2e8f0;
      --panel: rgba(30, 41, 59, 0.82);
      --panel-border: rgba(148, 163, 184, 0.15);
      --accent: #14b8a6;
      --accent-2: #fb923c;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(154, 52, 18, 0.18), transparent 25%),
        linear-gradient(135deg, #f8f4ec 0%, #f2e8db 45%, #ebe2d6 100%);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .dark body {
      background:
        radial-gradient(circle at top left, rgba(20, 184, 166, 0.10), transparent 30%),
        radial-gradient(circle at top right, rgba(251, 146, 60, 0.08), transparent 25%),
        linear-gradient(135deg, #0f172a 0%, #1e293b 45%, #0f172a 100%);
    }

    .glass {
      background: var(--panel);
      backdrop-filter: blur(18px);
      border: 1px solid var(--panel-border);
      box-shadow: 0 20px 60px rgba(31, 41, 55, 0.12);
    }

    .dark .glass {
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .prose-preview h1,
    .prose-preview h2,
    .prose-preview h3 {
      font-weight: 700;
      margin-bottom: 0.75rem;
      margin-top: 1.5rem;
    }

    .prose-preview p,
    .prose-preview ul,
    .prose-preview ol,
    .prose-preview blockquote,
    .prose-preview pre {
      margin-bottom: 1rem;
    }

    .prose-preview code {
      background: rgba(15, 23, 42, 0.08);
      border-radius: 6px;
      padding: 0.15rem 0.35rem;
    }

    .dark .prose-preview code {
      background: rgba(255, 255, 255, 0.1);
    }

    .prose-preview pre {
      background: #172033;
      color: #f8fafc;
      border-radius: 14px;
      padding: 1rem;
      overflow-x: auto;
    }

    .prose-preview blockquote {
      border-left: 4px solid rgba(15, 118, 110, 0.35);
      padding-left: 1rem;
      color: #334155;
    }

    .dark .prose-preview blockquote {
      color: #94a3b8;
    }

    .prose-preview .katex-display {
      overflow-x: auto;
    }

    .tb {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 2.25rem;
      border-radius: 0.75rem;
      border: 1px solid;
      transition: all 0.2s ease;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen">
    <div
      v-if="status.message"
      :class="[
        'fixed left-1/2 top-4 z-50 w-[min(32rem,calc(100vw-2rem))] -translate-x-1/2 rounded-2xl px-4 py-3 text-sm font-medium shadow-lg',
        status.type === 'error' ? 'bg-rose-600 text-white' : '',
        status.type === 'success' ? 'bg-emerald-600 text-white' : '',
        status.type === 'info' ? 'bg-slate-900 text-white dark:bg-slate-700' : ''
      ]"
    >
      <div class="flex items-center justify-between gap-4">
        <span>{{ status.message }}</span>
        <button class="rounded-full px-2 py-1 text-white/80 hover:text-white" @click="clearStatus">{{ t.close }}</button>
      </div>
    </div>

    <header class="border-b border-black/5 bg-white/55 backdrop-blur-xl dark:border-white/5 dark:bg-slate-900/70">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.32em] text-slate-500 dark:text-slate-400">post_admin</p>
          <h1 class="mt-1 text-2xl font-black tracking-tight text-slate-900 dark:text-slate-100">{{ t.siteTitle }}</h1>
        </div>
        <div class="flex items-center gap-2">
          <button
            @click="toggleTheme"
            :title="t.themeTooltip"
            class="tb w-9 border-slate-200 bg-white/70 text-slate-500 hover:border-amber-300 hover:bg-amber-50 hover:text-amber-500 dark:border-slate-600 dark:bg-slate-700/70 dark:text-slate-400 dark:hover:border-amber-500/50 dark:hover:bg-slate-600 dark:hover:text-amber-400"
          >
            <svg v-if="theme === 'dark'" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg v-else xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button
            @click="toggleLang"
            :title="t.langTooltip"
            class="tb px-3 border-slate-200 bg-white/70 text-xs font-bold text-slate-500 hover:border-slate-400 hover:bg-white hover:text-slate-900 dark:border-slate-600 dark:bg-slate-700/70 dark:text-slate-400 dark:hover:border-slate-400 dark:hover:bg-slate-600 dark:hover:text-white"
          >
            {{ lang === 'zh' ? 'EN' : '中文' }}
          </button>
          <button
            v-if="isLoggedIn"
            @click="handleRefresh"
            :title="t.refreshTooltip"
            class="tb w-9 border-slate-200 bg-white/70 text-slate-500 hover:border-teal-300 hover:bg-teal-50 hover:text-teal-600 dark:border-slate-600 dark:bg-slate-700/70 dark:text-slate-400 dark:hover:border-teal-500/50 dark:hover:bg-slate-600 dark:hover:text-teal-400"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
          <button
            v-if="isLoggedIn"
            @click="handleLogout"
            class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700 dark:bg-slate-700 dark:hover:bg-slate-600"
          >
            {{ t.logout }}
          </button>
        </div>
      </div>
    </header>

    <main :class="isLoggedIn ? 'mx-auto flex min-h-[calc(100vh-81px)] max-w-7xl flex-col px-4 py-6 sm:px-6 lg:px-8' : 'mx-auto flex min-h-[calc(100vh-81px)] max-w-7xl items-center justify-center px-4 py-6 sm:px-6 lg:px-8'">
      <section v-if="!isLoggedIn" class="mx-auto w-full max-w-md">
        <div class="glass rounded-[2rem] p-8 sm:p-10">
          <p class="text-sm font-semibold uppercase tracking-[0.3em] text-slate-500 dark:text-slate-400">Sign In</p>
          <h2 class="mt-3 text-3xl font-black text-slate-900 dark:text-slate-100">{{ t.loginTitle }}</h2>

          <div class="mt-8 space-y-4">
            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">{{ t.adminPassword }}</span>
              <input
                v-model="loginPassword"
                type="password"
                class="w-full rounded-2xl border border-slate-300 bg-white/75 px-4 py-4 text-base text-slate-900 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200 dark:border-slate-600 dark:bg-slate-800/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-teal-500 dark:focus:ring-teal-900"
                :placeholder="t.passwordPlaceholder"
                @keyup.enter="handleLogin"
              >
            </label>
            <button
              @click="handleLogin"
              :disabled="loading.auth"
              class="w-full rounded-2xl bg-teal-700 px-4 py-4 text-base font-bold text-white transition hover:bg-teal-800 disabled:cursor-not-allowed disabled:opacity-60"
            >
              {{ loading.auth ? t.verifying : t.login }}
            </button>
          </div>
        </div>
      </section>

      <section v-else class="grid flex-1 grid-cols-1 gap-5 xl:grid-cols-2 xl:items-stretch">
        <div class="glass flex h-full flex-col rounded-[2rem] p-5 sm:p-6">
          <div class="mb-4 flex items-center justify-between">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.28em] text-slate-500 dark:text-slate-400">{{ t.generate }}</p>
              <h2 class="mt-1 text-2xl font-black text-slate-900 dark:text-slate-100">{{ t.genConfig }}</h2>
            </div>
          </div>

          <div class="flex flex-1 flex-col gap-2.5">
          <div class="grid grid-cols-1 gap-2.5 md:grid-cols-2">
            <label class="block">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">{{ t.provider }}</span>
              <select v-model="form.provider" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200 dark:border-slate-600 dark:bg-slate-800/60 dark:text-slate-100 dark:focus:border-teal-500 dark:focus:ring-teal-900">
                <option value="deepseek">DeepSeek</option>
                <option value="openai">OpenAI</option>
                <option value="minimax">MiniMax</option>
                <option value="glm">GLM</option>
              </select>
            </label>
            <label class="block">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">{{ t.model }}</span>
              <input v-model="form.model" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200 dark:border-slate-600 dark:bg-slate-800/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-teal-500 dark:focus:ring-teal-900" :placeholder="t.modelPlaceholder">
            </label>
            <label class="block md:col-span-2">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">{{ t.title }}</span>
              <input v-model="form.title" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200 dark:border-slate-600 dark:bg-slate-800/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-teal-500 dark:focus:ring-teal-900" :placeholder="t.titlePlaceholder">
            </label>
            <label class="block">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">{{ t.coverImage }}</span>
              <input v-model="form.image" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200 dark:border-slate-600 dark:bg-slate-800/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-teal-500 dark:focus:ring-teal-900" placeholder="https://example.com/cover.png">
            </label>
            <label class="block">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">{{ t.category }}</span>
              <input v-model="form.category" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200 dark:border-slate-600 dark:bg-slate-800/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-teal-500 dark:focus:ring-teal-900">
            </label>
            <label class="block">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">{{ t.tags }}</span>
              <input v-model="form.tags" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200 dark:border-slate-600 dark:bg-slate-800/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-teal-500 dark:focus:ring-teal-900" :placeholder="t.tagsPlaceholder">
            </label>
            <label class="block">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">{{ t.keywords }}</span>
              <input v-model="form.keywords" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200 dark:border-slate-600 dark:bg-slate-800/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-teal-500 dark:focus:ring-teal-900">
            </label>
            <label class="block">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">{{ t.targetLength }}</span>
              <input v-model="form.targetLength" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200 dark:border-slate-600 dark:bg-slate-800/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-teal-500 dark:focus:ring-teal-900" :placeholder="t.targetLengthPlaceholder">
            </label>
          </div>
          <label class="flex flex-1 flex-col">
            <span class="mb-1.5 block text-sm font-semibold text-slate-700 dark:text-slate-300">{{ t.draft }}</span>
            <textarea v-model="form.draft" class="h-0 min-h-[100px] flex-1 w-full resize-none rounded-2xl border border-slate-300 bg-white/80 px-4 py-3 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200 dark:border-slate-600 dark:bg-slate-800/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-teal-500 dark:focus:ring-teal-900" :placeholder="t.draftPlaceholder"></textarea>
          </label>
          </div>

          <button
            @click="handleGenerate"
            :disabled="loading.generate"
            class="mt-4 w-full rounded-2xl bg-slate-900 px-4 py-4 text-base font-bold text-white transition hover:bg-slate-700 disabled:cursor-not-allowed disabled:opacity-60 dark:bg-slate-700 dark:hover:bg-slate-600"
          >
            {{ loading.generate ? t.generating : t.generateMarkdown }}
          </button>
        </div>

        <div class="glass flex h-full flex-col rounded-[2rem] p-6 sm:p-8">
          <div class="mb-5 flex items-center justify-between gap-4">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.28em] text-slate-500 dark:text-slate-400">{{ t.reviewPublish }}</p>
              <h2 class="mt-2 text-2xl font-black text-slate-900 dark:text-slate-100">{{ t.editPublish }}</h2>
            </div>
            <button
              @click="previewMode = true"
              class="rounded-xl border border-slate-300 bg-white/70 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-slate-500 hover:bg-white dark:border-slate-600 dark:bg-slate-700/70 dark:text-slate-300 dark:hover:border-slate-400 dark:hover:bg-slate-600"
            >
              {{ t.fullPreview }}
            </button>
          </div>

          <div class="flex flex-1 flex-col">
          <label class="flex flex-1 flex-col">
            <span class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">{{ t.markdownContent }}</span>
            <textarea v-model="form.markdown" class="h-0 min-h-[160px] flex-1 w-full resize-none rounded-2xl border border-slate-300 bg-white/80 px-4 py-4 font-mono text-sm leading-6 text-slate-900 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200 dark:border-slate-600 dark:bg-slate-800/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-teal-500 dark:focus:ring-teal-900" :placeholder="t.markdownPlaceholder"></textarea>
          </label>

          <div class="mt-4 grid grid-cols-1 gap-3 md:grid-cols-2">
            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">{{ t.filePath }}</span>
              <input v-model="form.filePath" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-3 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200 dark:border-slate-600 dark:bg-slate-800/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-teal-500 dark:focus:ring-teal-900" :placeholder="t.filePathPlaceholder">
            </label>
            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-slate-700 dark:text-slate-300">{{ t.commitMessage }}</span>
              <input v-model="form.commitMessage" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-3 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200 dark:border-slate-600 dark:bg-slate-800/60 dark:text-slate-100 dark:placeholder-slate-500 dark:focus:border-teal-500 dark:focus:ring-teal-900" :placeholder="t.commitMessagePlaceholder">
            </label>
          </div>

          <div class="mt-4 flex flex-wrap items-center gap-5 rounded-2xl border border-slate-200 bg-white/55 px-4 py-4 dark:border-slate-700 dark:bg-slate-800/50">
            <label class="inline-flex items-center gap-2 text-sm font-medium text-slate-700 dark:text-slate-300">
              <input v-model="form.syncToGitHub" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-teal-700 focus:ring-teal-600">
              <span>{{ t.syncGitHub }}</span>
            </label>
            <label class="inline-flex items-center gap-2 text-sm font-medium text-slate-700 dark:text-slate-300">
              <input v-model="form.syncToGitee" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-teal-700 focus:ring-teal-600">
              <span>{{ t.syncGitee }}</span>
            </label>
            <label class="inline-flex items-center gap-2 text-sm font-medium text-slate-700 dark:text-slate-300">
              <input v-model="form.overwrite" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-teal-700 focus:ring-teal-600">
              <span>{{ t.overwriteFile }}</span>
            </label>
          </div>
          </div>

          <button
            @click="handlePublish"
            :disabled="loading.publish"
            class="mt-5 w-full rounded-2xl bg-teal-700 px-4 py-4 text-base font-bold text-white transition hover:bg-teal-800 disabled:cursor-not-allowed disabled:opacity-60"
          >
            {{ loading.publish ? t.publishing : t.publishToRepo }}
          </button>

        </div>
      </section>
    </main>

    <div v-if="previewMode" class="fixed inset-0 z-40 bg-slate-950/40 backdrop-blur-sm">
      <div class="mx-auto flex h-full max-w-7xl flex-col px-4 py-4 sm:px-6 lg:px-8">
        <div class="glass flex h-full flex-col rounded-[2rem]">
          <div class="flex items-center justify-between border-b border-black/5 px-6 py-4 dark:border-white/5">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.28em] text-slate-500 dark:text-slate-400">{{ t.preview }}</p>
              <h3 class="mt-1 text-xl font-black text-slate-900 dark:text-slate-100">{{ t.immersivePreview }}</h3>
            </div>
            <button
              @click="closePreview"
              class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700 dark:bg-slate-700 dark:hover:bg-slate-600"
            >
              {{ t.close }}
            </button>
          </div>

          <div class="grid min-h-0 flex-1 grid-cols-1 gap-0 lg:grid-cols-2">
            <textarea
              id="preview-editor"
              v-model="form.markdown"
              class="min-h-[260px] w-full resize-none border-r border-black/5 bg-white/70 px-6 py-6 font-mono text-sm leading-6 text-slate-900 outline-none dark:border-white/5 dark:bg-slate-800/70 dark:text-slate-100"
            ></textarea>
            <div id="preview-panel" class="prose-preview overflow-y-auto bg-white px-6 py-6 text-sm leading-7 text-slate-800 dark:bg-slate-900 dark:text-slate-200" v-html="renderedMarkdown"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, computed, nextTick, onMounted, onBeforeUnmount, ref, watch } = Vue;

    const i18n = {
      zh: {
        siteTitle: 'AI 写作与发布后台',
        logout: '退出登录',
        loginTitle: '进入发布后台',
        adminPassword: '管理员密码',
        passwordPlaceholder: '输入 ADMIN_PASSWORD',
        verifying: '正在验证...',
        login: '登录',
        generate: 'Generate',
        genConfig: '生成配置',

    function escapeHtml(raw) {
      return String(raw || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /**
     * Shield math expressions from marked processing.
     * marked treats `\` as a markdown escape and strips it, which destroys
     * LaTeX commands like \frac, \sum, and delimiters like \[...\], \(...\).
     * We extract all math blocks first, let marked process the rest,
     * then restore them.
     */
    function shieldMath(markdown) {
      const store = [];
      let idx = 0;
      const hold = (match) => {
        const key = `MATHPH${idx++}ENDPH`;
        store.push({ key, raw: match });
        return key;
      };

      let text = markdown;

      // 1. Protect fenced code blocks from false-positive math extraction
      const codeStore = [];
      let ci = 0;
      text = text.replace(/(```+)[\s\S]*?\1/g, (m) => {
        const ck = `CODEPH${ci++}ENDPH`;
        codeStore.push({ key: ck, raw: m });
        return ck;
      });
      text = text.replace(/`[^`\n]+`/g, (m) => {
        const ck = `CODEPH${ci++}ENDPH`;
        codeStore.push({ key: ck, raw: m });
        return ck;
      });

      // 2. Extract math (order matters: display before inline)
      text = text.replace(/\$\$([\s\S]+?)\$\$/g, hold);
      text = text.replace(/\\\[([\s\S]+?)\\\]/g, hold);
      text = text.replace(/\\\((.+?)\\\)/g, hold);
      text = text.replace(/(?<!\$)\$(?!\$)([^\n$]+?)\$(?!\$)/g, hold);

      // 3. Restore code blocks (let marked handle them normally)
      for (const { key, raw } of codeStore) {
        text = text.replace(key, raw);
      }

      return { text, store };
    }

    function unshieldMath(html, store) {
      let result = html;
      for (const { key, raw } of store) {
        result = result.replace(key, escapeHtml(raw));
      }
      return result;
    }

    marked.setOptions({
      gfm: true,
      breaks: true,
      headerIds: false,
      mangle: false,
    });

    createApp({
      setup() {
        const isLoggedIn = ref(false);
        const previewMode = ref(false);
        const loginPassword = ref('');
        const loading = ref({ auth: false, generate: false, publish: false });
        const status = ref({ message: '', type: 'info' });
        const providerDefaults = ref({});

        const theme = ref(localStorage.getItem('post-admin-theme') || 'light');
        const lang = ref(localStorage.getItem('post-admin-lang') || 'zh');

        const t = computed(() => i18n[lang.value] || i18n.zh);

        const form = ref({
          provider: 'deepseek',
          model: '',
          title: '',
          image: '',
          category: '',
          tags: '',
          keywords: '',
          draft: '',
          targetLength: '1200-1800 words',
          markdown: '',
          filePath: '',
          commitMessage: '',
          syncToGitHub: false,
          syncToGitee: false,
          overwrite: false,
        });

        let statusTimer = null;
        let detachPreviewSync = null;

        const katexOptions = {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$', right: '$', display: false },
            { left: '\\(', right: '\\)', display: false },
            { left: '\\[', right: '\\]', display: true },
          ],
          throwOnError: false,
        };

        const renderedMarkdown = computed(() => {
          const raw = form.value.markdown || '';
          const { text, store } = shieldMath(raw);
          const html = marked.parse(escapeHtml(text));
          return unshieldMath(html, store);
        });

        function applyTheme(value) {
          const root = document.documentElement;
          if (value === 'dark') {
            root.classList.add('dark');
          } else {
            root.classList.remove('dark');
          }
          localStorage.setItem('post-admin-theme', value);
        }

        function applyLang(value) {
          document.documentElement.lang = value === 'zh' ? 'zh-CN' : 'en';
          localStorage.setItem('post-admin-lang', value);
        }

        function toggleTheme() {
          theme.value = theme.value === 'dark' ? 'light' : 'dark';
        }

        function toggleLang() {
          lang.value = lang.value === 'zh' ? 'en' : 'zh';
        }

        function handleRefresh() {
          form.value.title = '';
          form.value.image = '';
          form.value.category = '';
          form.value.tags = '';
          form.value.keywords = '';
          form.value.draft = '';
          form.value.markdown = '';
          form.value.filePath = '';
          form.value.commitMessage = '';
          showStatus(t.value.refreshSuccess, 'success');
        }

        function clearStatus() {
          status.value = { message: '', type: 'info' };
          if (statusTimer) {
            clearTimeout(statusTimer);
            statusTimer = null;
          }
        }

        function showStatus(message, type = 'info', persist = false, durationMs = 5000) {
          clearStatus();
          status.value = { message, type };
          if (!persist && type !== 'error') {
            statusTimer = setTimeout(() => {
              clearStatus();
            }, durationMs);
          }
        }

        async function renderMath() {
          await nextTick();
          if (!window.renderMathInElement) {
            return;
          }

          const targets = ['preview-panel'];
          targets.forEach((id) => {
            const element = document.getElementById(id);
            if (element) {
              window.renderMathInElement(element, katexOptions);
            }
          });
        }

        function attachPreviewSync() {
          const editor = document.getElementById('preview-editor');
          const preview = document.getElementById('preview-panel');
          if (!editor || !preview) {
            detachPreviewSync = null;
            return;
          }

          let syncing = false;

          const syncScroll = (from, to) => {
            if (syncing) {
              return;
            }

            syncing = true;
            const fromRange = from.scrollHeight - from.clientHeight;
            const toRange = to.scrollHeight - to.clientHeight;
            const ratio = fromRange > 0 ? from.scrollTop / fromRange : 0;
            to.scrollTop = ratio * Math.max(toRange, 0);
            requestAnimationFrame(() => {
              syncing = false;
            });
          };

          const handleEditorScroll = () => syncScroll(editor, preview);
          const handlePreviewScroll = () => syncScroll(preview, editor);

          editor.addEventListener('scroll', handleEditorScroll);
          preview.addEventListener('scroll', handlePreviewScroll);

          detachPreviewSync = () => {
            editor.removeEventListener('scroll', handleEditorScroll);
            preview.removeEventListener('scroll', handlePreviewScroll);
            detachPreviewSync = null;
          };
        }

        function closePreview() {
          previewMode.value = false;
          if (detachPreviewSync) {
            detachPreviewSync();
          }
        }

        function applyProviderDefault(provider, force = false) {
          const defaultModel = providerDefaults.value?.[provider]?.model || '';
          if (!defaultModel) {
            return;
          }

          if (force || !form.value.model.trim()) {
            form.value.model = defaultModel;
          }
        }

        async function checkAuth() {
          try {
            const { data } = await axios.get('/api/check-auth/');
            isLoggedIn.value = Boolean(data.authenticated);
          } catch (error) {
            showStatus(t.value.authCheckFailed, 'error', true);
          }
        }

        async function loadPublicConfig() {
          try {
            const { data } = await axios.get('/api/public-config/');
            providerDefaults.value = data.providers || {};
            applyProviderDefault(form.value.provider, true);
          } catch (error) {
            showStatus(t.value.configLoadFailed, 'error', true);
          }
        }

        async function handleLogin() {
          if (!loginPassword.value) {
            showStatus(t.value.enterPassword, 'error', true);
            return;
          }

          loading.value.auth = true;
          try {
            await axios.post('/api/login/', { password: loginPassword.value });
            loginPassword.value = '';
            isLoggedIn.value = true;
            showStatus(t.value.loginSuccess, 'success');
          } catch (error) {
            showStatus(error.response?.data?.error || t.value.loginFailed, 'error', true);
          } finally {
            loading.value.auth = false;
          }
        }

        async function handleLogout() {
          try {
            await axios.post('/api/logout/');
            isLoggedIn.value = false;
            showStatus(t.value.logoutSuccess, 'success');
          } catch (error) {
            showStatus(error.response?.data?.error || t.value.logoutFailed, 'error', true);
          }
        }

        async function handleGenerate() {
          if (!form.value.title.trim()) {
            showStatus(t.value.titleRequired, 'error', true);
            return;
          }

          if (!form.value.draft.trim()) {
            showStatus(t.value.draftRequired, 'error', true);
            return;
          }

          loading.value.generate = true;
          showStatus(t.value.requestingModel, 'info');
          try {
            const { data } = await axios.post('/api/generate/', { ...form.value });
            form.value.markdown = data.markdown || '';
            if (data.suggestedFilePath && !form.value.filePath) {
              form.value.filePath = data.suggestedFilePath;
            }
            showStatus(t.value.generateSuccess, 'success');
          } catch (error) {
            showStatus(error.response?.data?.error || t.value.generateFailed, 'error', true);
          } finally {
            loading.value.generate = false;
          }
        }

        async function handlePublish() {
          if (!form.value.filePath.trim()) {
            showStatus(t.value.filePathRequired, 'error', true);
            return;
          }

          if (!form.value.markdown.trim()) {
            showStatus(t.value.markdownRequired, 'error', true);
            return;
          }

          if (!form.value.syncToGitHub && !form.value.syncToGitee) {
            showStatus(t.value.selectTarget, 'error', true);
            return;
          }

          loading.value.publish = true;
          showStatus(t.value.publishingToRepo, 'info');
          try {
            const { data } = await axios.post('/api/publish/', { ...form.value });
            const links = [data.urls?.github, data.urls?.gitee].filter(Boolean).join(' | ');
            showStatus(`${t.value.publishSuccess}${links ? ` ${links}` : ''}`, 'success', false, links ? 8000 : 5000);
          } catch (error) {
            showStatus(error.response?.data?.error || t.value.publishFailed, 'error', true);
          } finally {
            loading.value.publish = false;
          }
        }

        watch(theme, (value) => {
          applyTheme(value);
        });

        watch(lang, (value) => {
          applyLang(value);
        });

        watch(() => form.value.markdown, () => {
          renderMath();
        });

        watch(() => form.value.provider, (provider) => {
          applyProviderDefault(provider, true);
        });

        watch(previewMode, async (enabled) => {
          if (enabled) {
            await renderMath();
            attachPreviewSync();
            return;
          }

          if (detachPreviewSync) {
            detachPreviewSync();
          }
        });

        onMounted(async () => {
          applyTheme(theme.value);
          applyLang(lang.value);
          await loadPublicConfig();
          await checkAuth();
          await renderMath();
        });

        onBeforeUnmount(() => {
          clearStatus();
          if (detachPreviewSync) {
            detachPreviewSync();
          }
        });

        return {
          isLoggedIn,
          previewMode,
          loginPassword,
          loading,
          status,
          providerDefaults,
          form,
          theme,
          lang,
          t,
          renderedMarkdown,
          clearStatus,
          closePreview,
          toggleTheme,
          toggleLang,
          handleRefresh,
          handleLogin,
          handleLogout,
          handleGenerate,
          handlePublish,
        };
      },
    }).mount('#app');
  </script>
