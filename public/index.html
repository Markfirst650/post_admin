<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>博客内容生成与发布管理台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    /* basic markdown preview styling */
    .prose h1, .prose h2, .prose h3 { font-weight: bold; margin-bottom: 0.5rem; }
    .prose p { margin-bottom: 1rem; }
    .prose code { background: #e2e8f0; padding: 2px 4px; border-radius: 4px; }
    
    /* 自定义背景图样式 */
    body {
      /* 将下面的 URL 替换为你想要的背景图地址 */
      background-image: url('https://cdn-r2.solmount.top/image/2026/03/14/69b510950342b.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }
  </style>
</head>
<body class="text-gray-900 font-sans antialiased">
<div id="app" class="min-h-screen flex flex-col relative bg-black/10">
  
  <!-- StatusBar -->
  <div v-if="status" :class="['fixed top-0 left-0 w-full z-50 p-3 text-center text-white text-sm font-medium', statusType === 'error' ? 'bg-red-500' : (statusType === 'success' ? 'bg-green-500' : 'bg-blue-500')]">
    {{ status }}
    <button class="absolute top-2 right-4 text-white" @click="status = ''">✕</button>
  </div>

  <!-- Fullscreen Preview Modal -->
  <div v-if="previewMode" class="fixed inset-0 z-[100] bg-white flex flex-col w-full h-full shadow-2xl">
    <div class="flex items-center justify-between p-4 border-b bg-gray-100 shadow-sm shrink-0">
      <h2 class="text-lg font-bold text-gray-800">Markdown 沉浸式双栏预览</h2>
      <button @click="previewMode = false" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-md focus:outline-none font-medium">退出全屏预览</button>
    </div>
    <div class="flex-grow flex flex-row w-full h-[calc(100vh-70px)] overflow-hidden">
      <!-- Left: Editor -->
      <div class="w-1/2 h-full border-r border-gray-300">
        <textarea v-model="form.markdown" class="w-full h-full p-6 resize-none focus:outline-none font-mono text-sm leading-relaxed bg-gray-50/50" placeholder="在此编辑 Markdown..."></textarea>
      </div>
      <!-- Right: Preview -->
      <div class="w-1/2 h-full p-6 overflow-y-auto bg-white prose max-w-none" v-html="renderedMarkdown"></div>
    </div>
  </div>

  <header class="bg-white/60 backdrop-blur-xl shadow-sm border-b border-white/40 shrink-0 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8 flex justify-between items-center">
      <h1 class="text-2xl font-black text-gray-800 tracking-tight drop-shadow-sm flex items-center gap-3">
        </span>
        博客生成与发布管理台
      </h1>
      <button v-if="isLoggedIn" @click="handleLogout" class="text-sm font-bold bg-white/50 hover:bg-red-500 hover:text-white text-red-600 border border-red-200/50 hover:border-red-500 px-5 py-2 rounded-xl transition-all duration-300 shadow-sm flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        安全退出
      </button>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center p-4">
    <!-- Login Panel -->
    <div v-if="!isLoggedIn" class="bg-white/70 backdrop-blur-xl p-10 rounded-[2rem] shadow-2xl max-w-md w-full border border-white/50 relative overflow-hidden">
      
      <div class="text-center mb-8 mt-2">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-white/80 shadow-inner mb-5 border border-white">
          <svg class="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h2 class="text-2xl font-black text-gray-800 tracking-tight">授权访问</h2>

      </div>

      <div class="space-y-6">
        <div class="relative">
          <input type="password" v-model="loginPassword" placeholder="输入访问密码..." @keyup.enter="handleLogin" class="w-full bg-white/60 border border-white/50 rounded-2xl py-4 px-5 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all duration-300 text-gray-800 tracking-widest font-mono text-lg shadow-inner placeholder-gray-400 placeholder:tracking-normal placeholder:font-sans">
        </div>
        <button @click="handleLogin" :disabled="loading.auth" class="w-full bg-gradient-to-r from-indigo-500/90 to-purple-600/90 backdrop-blur-md text-white font-bold py-4 rounded-2xl hover:from-indigo-600 hover:to-purple-700 disabled:opacity-50 shadow-xl border border-white/20 transition-all duration-300 flex items-center justify-center text-lg gap-2">
          <span v-if="loading.auth">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
          </span>
          {{ loading.auth ? '正在验证身份...' : '进入发布页' }}
        </button>
      </div>
    </div>

    <!-- Admin Panel -->
    <div v-else class="max-w-7xl w-full grid grid-cols-1 md:grid-cols-2 gap-6 items-stretch min-h-[750px] pb-10 mt-6">
      
      <!-- Left Column: Generate Meta -->
      <div class="bg-white/70 backdrop-blur-xl p-8 rounded-2xl shadow-xl flex flex-col space-y-5 border border-white/40">
        <h2 class="text-xl font-bold text-gray-800 mb-2 border-b border-gray-400/30 pb-3 shrink-0">一、内容生成与配置</h2>
        
        <div class="grid grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">模型渠道 (Provider)</label>
            <select v-model="form.provider" class="w-full bg-white/60 border border-white/50 rounded-xl py-2 px-3 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all duration-300 text-gray-800">
              <option value="deepseek">DeepSeek</option>
              <option value="openai">OpenAI (或其他兼容协议)</option>
              <option value="minimax">MiniMax</option>
              <option value="glm">GLM</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">模型名称 (Model)</label>
            <input type="text" v-model="form.model" class="w-full bg-white/60 border border-white/50 rounded-xl py-2 px-3 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all duration-300 text-gray-800 placeholder-gray-500" placeholder="deepseek-chat">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-5">
          <div class="col-span-2 md:col-span-1">
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">文章标题 *</label>
            <input type="text" v-model="form.title" class="w-full bg-white/60 border border-white/50 rounded-xl py-2 px-3 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all duration-300 text-gray-800">
          </div>
          <div class="col-span-2 md:col-span-1">
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">文章封面链接</label>
            <input type="text" v-model="form.image" class="w-full bg-white/60 border border-white/50 rounded-xl py-2 px-3 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all duration-300 text-gray-800 placeholder-gray-500" placeholder="https://...">
          </div>
        </div>

        <div class="grid grid-cols-3 gap-5">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">分类 (Category)</label>
            <input type="text" v-model="form.category" class="w-full bg-white/60 border border-white/50 rounded-xl py-2 px-3 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all duration-300 text-gray-800">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">标签 (Tags)</label>
            <input type="text" v-model="form.tags" class="w-full bg-white/60 border border-white/50 rounded-xl py-2 px-3 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all duration-300 text-gray-800">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1.5">关键词 (Keywords)</label>
            <input type="text" v-model="form.keywords" class="w-full bg-white/60 border border-white/50 rounded-xl py-2 px-3 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all duration-300 text-gray-800">
          </div>
        </div>

        <div>
           <label class="block text-sm font-semibold text-gray-700 mb-1.5">目标篇幅字数</label>
           <input type="text" v-model="form.targetLength" class="w-full bg-white/60 border border-white/50 rounded-xl py-2 px-3 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all duration-300 text-gray-800 placeholder-gray-500" placeholder="1200-1800">
        </div>

        <div class="flex-grow flex flex-col min-h-[180px]">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">输入草稿 / 核心指令</label>
          <textarea v-model="form.draft" class="w-full flex-grow bg-white/60 border border-white/50 rounded-xl py-3 px-4 resize-none focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400/50 transition-all duration-300 text-gray-800 placeholder-gray-500" placeholder="在此输入草稿、指令或核心要点..."></textarea>
        </div>

        <button @click="handleGenerate" :disabled="loading.generate" class="mt-4 shrink-0 w-full bg-gradient-to-r from-indigo-500/90 to-purple-600/90 backdrop-blur-md text-white font-bold py-3 rounded-xl hover:from-indigo-600 hover:to-purple-700 disabled:opacity-50 flex items-center justify-center shadow-lg border border-white/20 transition-all duration-300">
          <span v-if="loading.generate">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
            AI 正在生成中，请耐心等待...
          </span>
          <span v-else>智能生成 Markdown</span>
        </button>
      </div>

      <!-- Right Column: Result, Edit & Publish -->
      <div class="bg-white/70 backdrop-blur-xl p-8 rounded-2xl shadow-xl flex flex-col border border-white/40">
        <h2 class="text-xl font-bold text-gray-800 mb-4 border-b border-gray-400/30 pb-3 flex justify-between items-center shrink-0">
          二、生成结果与发布
          <button @click="previewMode = true" class="text-sm bg-white/60 hover:bg-white/90 backdrop-blur-sm border border-white/50 px-4 py-1.5 rounded-lg text-indigo-700 font-bold transition-all shadow-sm">
            全屏实时预览
          </button>
        </h2>

        <div class="flex-grow overflow-hidden flex flex-col space-y-5">
          
          <div class="flex-grow overflow-hidden relative border border-white/50 rounded-xl bg-white/50 backdrop-blur-sm shadow-inner transition-colors duration-300 focus-within:bg-white/80">
            <textarea v-model="form.markdown" class="w-full h-full p-5 resize-none bg-transparent focus:outline-none text-gray-800 font-mono text-sm leading-relaxed" placeholder="等待生成 Markdown 或在此处直接编写..."></textarea>
          </div>
          
          <!-- Publish Settings -->
          <div class="grid grid-cols-2 gap-3 bg-white/40 backdrop-blur-md p-5 rounded-xl border border-white/50 shadow-sm">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-1.5">文件路径 (src/content/posts/...)</label>
              <input type="text" v-model="form.filePath" class="w-full bg-white/60 border border-white/50 rounded-lg py-2 px-3 focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-400/50 transition-all duration-300 text-gray-800 placeholder-gray-500" placeholder="post-title.md">
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-1.5">提交信息 (Commit Msg)</label>
              <input type="text" v-model="form.commitMessage" class="w-full bg-white/60 border border-white/50 rounded-lg py-2 px-3 focus:bg-white focus:outline-none focus:ring-2 focus:ring-emerald-400/50 transition-all duration-300 text-gray-800 placeholder-gray-500" placeholder="Update post">
            </div>
            <div class="flex items-center col-span-2 space-x-6 mt-2 pt-2 border-t border-gray-300/30">
              <label class="flex items-center space-x-2 text-sm font-medium text-gray-700 cursor-pointer">
                <input type="checkbox" v-model="form.syncToGitee" class="w-4 h-4 rounded border-gray-300 text-emerald-500 focus:ring-emerald-500 bg-white/50">
                <span>同步推送至 Gitee</span>
              </label>
              <label class="flex items-center space-x-2 text-sm font-medium text-gray-700 cursor-pointer">
                <input type="checkbox" v-model="form.overwrite" class="w-4 h-4 rounded border-gray-300 text-emerald-500 focus:ring-emerald-500 bg-white/50">
                <span>覆盖已有同名文件</span>
              </label>
            </div>
          </div>

          <button @click="handlePublish" :disabled="loading.publish" class="w-full bg-gradient-to-r from-emerald-500/90 to-teal-600/90 backdrop-blur-md text-white font-bold py-3 rounded-xl hover:from-emerald-600 hover:to-teal-700 disabled:opacity-50 flex items-center justify-center shadow-lg border border-white/20 transition-all duration-300">
            <span v-if="loading.publish">
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
              发布推送到仓库中...
            </span>
            <span v-else>推送到代码仓库 (GitHub {{ form.syncToGitee ? ' & Gitee' : '' }})</span>
          </button>

        </div>
      </div>

    </div>
  </main>
</div>

<script>
  const { createApp, ref, computed, onMounted } = Vue;

  createApp({
    setup() {
      const isLoggedIn = ref(false);
      const loading = ref({ auth: false, generate: false, publish: false });
      const status = ref('');
      const statusType = ref('info'); // info, success, error
      const previewMode = ref(false);

      const loginPassword = ref('');
      const form = ref({
        provider: 'deepseek',
        model: 'deepseek-chat',
        title: '',
        image: '',
        category: '',
        tags: '',
        keywords: '',
        draft: '',
        targetLength: '1200-1800',
        markdown: '',
        filePath: '',
        commitMessage: '',
        syncToGitee: true,
        overwrite: false,
      });

      const showMessage = (msg, type = 'info') => {
        status.value = msg;
        statusType.value = type;
        if(type !== 'error') {
          setTimeout(() => { if (status.value === msg) status.value = ''; }, 5000);
        }
      };

      const handleLogin = async () => {
        if(!loginPassword.value) return showMessage('请输入密码', 'error');
        loading.value.auth = true;
        try {
          await axios.post('/api/login/', { password: loginPassword.value });
          isLoggedIn.value = true;
          showMessage('登录成功', 'success');
          // Reload properly to ensure clean state
          window.location.reload();
        } catch (e) {
          showMessage(e.response?.data?.error || '登录失败', 'error');
        } finally {
          loading.value.auth = false;
        }
      };

      const handleLogout = async () => {
        await axios.post('/api/logout/');
        window.location.reload();
      };

      const checkAuth = async () => {
        try { 
          const { data } = await axios.get('/api/check-auth/');
          isLoggedIn.value = data.authenticated;
        } catch (e) {}
      };

      const handleGenerate = async () => {
        if(!form.value.title) return showMessage('标题为必填项', 'error');
        loading.value.generate = true;
        showMessage('请求生成中，请耐心等待大模型返回结果...', 'info');
        
        try {
          const { data } = await axios.post('/api/generate/', { ...form.value });
          form.value.markdown = data.markdown;
          if(data.suggestedFilePath && !form.value.filePath) {
            form.value.filePath = data.suggestedFilePath;
          }
          showMessage('生成成功！请检查并可在下方调整', 'success');
        } catch (e) {
          showMessage('生成失败: ' + (e.response?.data?.error || e.message), 'error');
        } finally {
          loading.value.generate = false;
        }
      };

      const handlePublish = async () => {
        if(!form.value.filePath) return showMessage('提交失败，请填写文件路径', 'error');
        loading.value.publish = true;
        showMessage('正在推送到仓库中...', 'info');

        try {
           const { data } = await axios.post('/api/publish/', { ...form.value });
           showMessage(`发布成功！GitHub链接: ${data.urls.github} ${data.urls.gitee ? (' | Gitee链接: ' + data.urls.gitee) : ''}`, 'success');
        } catch (e) {
           showMessage('发布失败: ' + (e.response?.data?.error || e.message), 'error');
        } finally {
           loading.value.publish = false;
        }
      };

      const renderedMarkdown = computed(() => marked.parse(form.value.markdown || ''));

      onMounted(() => {
        checkAuth();
      });

      return {
        isLoggedIn, loading, status, statusType, previewMode,
        loginPassword, form, 
        handleLogin, handleLogout, handleGenerate, handlePublish,
        renderedMarkdown
      };
    }
  }).mount('#app');
</script>
</body>
</html>
