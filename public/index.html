<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>post_admin</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5efe6;
      --ink: #1e2430;
      --panel: rgba(255, 251, 245, 0.82);
      --panel-border: rgba(78, 61, 46, 0.12);
      --accent: #0f766e;
      --accent-2: #9a3412;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(154, 52, 18, 0.18), transparent 25%),
        linear-gradient(135deg, #f8f4ec 0%, #f2e8db 45%, #ebe2d6 100%);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .glass {
      background: var(--panel);
      backdrop-filter: blur(18px);
      border: 1px solid var(--panel-border);
      box-shadow: 0 20px 60px rgba(31, 41, 55, 0.12);
    }

    .prose-preview h1,
    .prose-preview h2,
    .prose-preview h3 {
      font-weight: 700;
      margin-bottom: 0.75rem;
      margin-top: 1.5rem;
    }

    .prose-preview p,
    .prose-preview ul,
    .prose-preview ol,
    .prose-preview blockquote,
    .prose-preview pre {
      margin-bottom: 1rem;
    }

    .prose-preview code {
      background: rgba(15, 23, 42, 0.08);
      border-radius: 6px;
      padding: 0.15rem 0.35rem;
    }

    .prose-preview pre {
      background: #172033;
      color: #f8fafc;
      border-radius: 14px;
      padding: 1rem;
      overflow-x: auto;
    }

    .prose-preview blockquote {
      border-left: 4px solid rgba(15, 118, 110, 0.35);
      padding-left: 1rem;
      color: #334155;
    }

    .prose-preview .katex-display {
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div id="app" class="min-h-screen">
    <div
      v-if="status.message"
      :class="[
        'fixed left-1/2 top-4 z-50 w-[min(32rem,calc(100vw-2rem))] -translate-x-1/2 rounded-2xl px-4 py-3 text-sm font-medium shadow-lg',
        status.type === 'error' ? 'bg-rose-600 text-white' : '',
        status.type === 'success' ? 'bg-emerald-600 text-white' : '',
        status.type === 'info' ? 'bg-slate-900 text-white' : ''
      ]"
    >
      <div class="flex items-center justify-between gap-4">
        <span>{{ status.message }}</span>
        <button class="rounded-full px-2 py-1 text-white/80 hover:text-white" @click="clearStatus">关闭</button>
      </div>
    </div>

    <header class="border-b border-black/5 bg-white/55 backdrop-blur-xl">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.32em] text-slate-500">post_admin</p>
          <h1 class="mt-1 text-2xl font-black tracking-tight text-slate-900">AI 写作与发布后台</h1>
        </div>
        <div class="flex items-center gap-3">
          <button
            v-if="isLoggedIn"
            @click="handleLogout"
            class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700"
          >
            退出登录
          </button>
        </div>
      </div>
    </header>

    <main :class="isLoggedIn ? 'mx-auto flex min-h-[calc(100vh-81px)] max-w-7xl flex-col px-4 py-6 sm:px-6 lg:px-8' : 'mx-auto flex min-h-[calc(100vh-81px)] max-w-7xl items-center justify-center px-4 py-6 sm:px-6 lg:px-8'">
      <section v-if="!isLoggedIn" class="mx-auto w-full max-w-md">
        <div class="glass rounded-[2rem] p-8 sm:p-10">
          <p class="text-sm font-semibold uppercase tracking-[0.3em] text-slate-500">Sign In</p>
          <h2 class="mt-3 text-3xl font-black text-slate-900">进入发布后台</h2>
          <p class="mt-3 text-sm leading-6 text-slate-600">
            当前版本默认启用更严格的 cookie、限流和服务端校验。适合放在 HTTPS 和反向代理之后公开访问。
          </p>

          <div class="mt-8 space-y-4">
            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-slate-700">管理员密码</span>
              <input
                v-model="loginPassword"
                type="password"
                class="w-full rounded-2xl border border-slate-300 bg-white/75 px-4 py-4 text-base text-slate-900 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200"
                placeholder="输入 ADMIN_PASSWORD"
                @keyup.enter="handleLogin"
              >
            </label>
            <button
              @click="handleLogin"
              :disabled="loading.auth"
              class="w-full rounded-2xl bg-teal-700 px-4 py-4 text-base font-bold text-white transition hover:bg-teal-800 disabled:cursor-not-allowed disabled:opacity-60"
            >
              {{ loading.auth ? '正在验证...' : '登录' }}
            </button>
          </div>
        </div>
      </section>

      <section v-else class="grid flex-1 grid-cols-1 gap-5 xl:grid-cols-2 xl:items-stretch">
        <div class="glass flex h-full flex-col rounded-[2rem] p-5 sm:p-6">
          <div class="mb-4 flex items-center justify-between">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.28em] text-slate-500">Generate</p>
              <h2 class="mt-1 text-2xl font-black text-slate-900">生成配置</h2>
            </div>
          </div>

          <div class="flex flex-1 flex-col gap-2.5">
          <div class="grid grid-cols-1 gap-2.5 md:grid-cols-2">
            <label class="block">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700">Provider</span>
              <select v-model="form.provider" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200">
                <option value="deepseek">DeepSeek</option>
                <option value="openai">OpenAI</option>
                <option value="minimax">MiniMax</option>
                <option value="glm">GLM</option>
              </select>
            </label>
            <label class="block">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700">Model</span>
              <input v-model="form.model" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200" placeholder="留空则使用默认模型">
            </label>
            <label class="block md:col-span-2">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700">标题</span>
              <input v-model="form.title" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200" placeholder="AI 助力的 Markdown 内容生成与发布工具">
            </label>
            <label class="block">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700">封面图</span>
              <input v-model="form.image" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200" placeholder="https://example.com/cover.png">
            </label>
            <label class="block">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700">分类</span>
              <input v-model="form.category" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200">
            </label>
            <label class="block">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700">标签</span>
              <input v-model="form.tags" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200" placeholder="ai, markdown, publishing">
            </label>
            <label class="block">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700">关键词 / 描述线索</span>
              <input v-model="form.keywords" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200">
            </label>
            <label class="block">
              <span class="mb-1.5 block text-sm font-semibold text-slate-700">目标长度</span>
              <input v-model="form.targetLength" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-2.5 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200" placeholder="1200-1800 words">
            </label>
          </div>
          <label class="flex flex-1 flex-col">
            <span class="mb-1.5 block text-sm font-semibold text-slate-700">草稿 / 写作指令</span>
            <textarea v-model="form.draft" class="h-0 min-h-[100px] flex-1 w-full resize-none rounded-2xl border border-slate-300 bg-white/80 px-4 py-3 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200" placeholder="写清核心观点、结构要求、是否需要 Mermaid / 引用 / 示例。"></textarea>
          </label>
          </div>

          <button
            @click="handleGenerate"
            :disabled="loading.generate"
            class="mt-4 w-full rounded-2xl bg-slate-900 px-4 py-4 text-base font-bold text-white transition hover:bg-slate-700 disabled:cursor-not-allowed disabled:opacity-60"
          >
            {{ loading.generate ? '正在生成...' : '生成 Markdown' }}
          </button>
        </div>

        <div class="glass flex h-full flex-col rounded-[2rem] p-6 sm:p-8">
          <div class="mb-5 flex items-center justify-between gap-4">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.28em] text-slate-500">Review & Publish</p>
              <h2 class="mt-2 text-2xl font-black text-slate-900">编辑与发布</h2>
            </div>
            <button
              @click="previewMode = true"
              class="rounded-xl border border-slate-300 bg-white/70 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:border-slate-500 hover:bg-white"
            >
              全屏预览
            </button>
          </div>

          <div class="flex flex-1 flex-col">
          <label class="flex flex-1 flex-col">
            <span class="mb-2 block text-sm font-semibold text-slate-700">Markdown 内容</span>
            <textarea v-model="form.markdown" class="h-0 min-h-[160px] flex-1 w-full resize-none rounded-2xl border border-slate-300 bg-white/80 px-4 py-4 font-mono text-sm leading-6 text-slate-900 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200" placeholder="生成结果会出现在这里，你也可以手动编辑。"></textarea>
          </label>

          <div class="mt-4 grid grid-cols-1 gap-3 md:grid-cols-2">
            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-slate-700">文件路径</span>
              <input v-model="form.filePath" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-3 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200" placeholder="nested/post-name.md">

            </label>
            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-slate-700">提交信息</span>
              <input v-model="form.commitMessage" type="text" class="w-full rounded-xl border border-slate-300 bg-white/80 px-3 py-3 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200" placeholder="Add new article">
              
            </label>
          </div>

          <div class="mt-4 flex flex-wrap items-center gap-5 rounded-2xl border border-slate-200 bg-white/55 px-4 py-4">
            <label class="inline-flex items-center gap-2 text-sm font-medium text-slate-700">
              <input v-model="form.syncToGitHub" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-teal-700 focus:ring-teal-600">
              <span>同步到 GitHub</span>
            </label>
            <label class="inline-flex items-center gap-2 text-sm font-medium text-slate-700">
              <input v-model="form.syncToGitee" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-teal-700 focus:ring-teal-600">
              <span>同步到 Gitee</span>
            </label>
            <label class="inline-flex items-center gap-2 text-sm font-medium text-slate-700">
              <input v-model="form.overwrite" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-teal-700 focus:ring-teal-600">
              <span>覆盖同名文件</span>
            </label>
          </div>
          </div>

          <button
            @click="handlePublish"
            :disabled="loading.publish"
            class="mt-5 w-full rounded-2xl bg-teal-700 px-4 py-4 text-base font-bold text-white transition hover:bg-teal-800 disabled:cursor-not-allowed disabled:opacity-60"
          >
            {{ loading.publish ? '正在发布...' : '发布到内容仓库' }}
          </button>

        </div>
      </section>
    </main>

    <div v-if="previewMode" class="fixed inset-0 z-40 bg-slate-950/40 backdrop-blur-sm">
      <div class="mx-auto flex h-full max-w-7xl flex-col px-4 py-4 sm:px-6 lg:px-8">
        <div class="glass flex h-full flex-col rounded-[2rem]">
          <div class="flex items-center justify-between border-b border-black/5 px-6 py-4">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.28em] text-slate-500">Preview</p>
              <h3 class="mt-1 text-xl font-black text-slate-900">沉浸式双栏预览</h3>
            </div>
            <button
              @click="closePreview"
              class="rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700"
            >
              关闭
            </button>
          </div>

          <div class="grid min-h-0 flex-1 grid-cols-1 gap-0 lg:grid-cols-2">
            <textarea
              id="preview-editor"
              v-model="form.markdown"
              class="min-h-[260px] w-full resize-none border-r border-black/5 bg-white/70 px-6 py-6 font-mono text-sm leading-6 text-slate-900 outline-none"
            ></textarea>
            <div id="preview-panel" class="prose-preview overflow-y-auto bg-white px-6 py-6 text-sm leading-7 text-slate-800" v-html="renderedMarkdown"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { createApp, computed, nextTick, onMounted, onBeforeUnmount, ref, watch } = Vue;

    function escapeHtml(raw) {
      return String(raw || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    marked.setOptions({
      gfm: true,
      breaks: true,
      headerIds: false,
      mangle: false,
    });

    createApp({
      setup() {
        const isLoggedIn = ref(false);
        const previewMode = ref(false);
        const loginPassword = ref('');
        const loading = ref({ auth: false, generate: false, publish: false });
        const status = ref({ message: '', type: 'info' });
        const providerDefaults = ref({});
        const form = ref({
          provider: 'deepseek',
          model: '',
          title: '',
          image: '',
          category: '',
          tags: '',
          keywords: '',
          draft: '',
          targetLength: '1200-1800 words',
          markdown: '',
          filePath: '',
          commitMessage: '',
          syncToGitHub: false,
          syncToGitee: false,
          overwrite: false,
        });

        let statusTimer = null;
        let detachPreviewSync = null;

        const katexOptions = {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$', right: '$', display: false },
            { left: '\\(', right: '\\)', display: false },
            { left: '\\[', right: '\\]', display: true },
          ],
          throwOnError: false,
        };

        const renderedMarkdown = computed(() => {
          const safeMarkdown = escapeHtml(form.value.markdown);
          return marked.parse(safeMarkdown);
        });

        function clearStatus() {
          status.value = { message: '', type: 'info' };
          if (statusTimer) {
            clearTimeout(statusTimer);
            statusTimer = null;
          }
        }

        function showStatus(message, type = 'info', persist = false, durationMs = 5000) {
          clearStatus();
          status.value = { message, type };
          if (!persist && type !== 'error') {
            statusTimer = setTimeout(() => {
              clearStatus();
            }, durationMs);
          }
        }

        async function renderMath() {
          await nextTick();
          if (!window.renderMathInElement) {
            return;
          }

          const targets = ['preview-panel'];
          targets.forEach((id) => {
            const element = document.getElementById(id);
            if (element) {
              window.renderMathInElement(element, katexOptions);
            }
          });
        }

        function attachPreviewSync() {
          const editor = document.getElementById('preview-editor');
          const preview = document.getElementById('preview-panel');
          if (!editor || !preview) {
            detachPreviewSync = null;
            return;
          }

          let syncing = false;

          const syncScroll = (from, to) => {
            if (syncing) {
              return;
            }

            syncing = true;
            const fromRange = from.scrollHeight - from.clientHeight;
            const toRange = to.scrollHeight - to.clientHeight;
            const ratio = fromRange > 0 ? from.scrollTop / fromRange : 0;
            to.scrollTop = ratio * Math.max(toRange, 0);
            requestAnimationFrame(() => {
              syncing = false;
            });
          };

          const handleEditorScroll = () => syncScroll(editor, preview);
          const handlePreviewScroll = () => syncScroll(preview, editor);

          editor.addEventListener('scroll', handleEditorScroll);
          preview.addEventListener('scroll', handlePreviewScroll);

          detachPreviewSync = () => {
            editor.removeEventListener('scroll', handleEditorScroll);
            preview.removeEventListener('scroll', handlePreviewScroll);
            detachPreviewSync = null;
          };
        }

        function closePreview() {
          previewMode.value = false;
          if (detachPreviewSync) {
            detachPreviewSync();
          }
        }

        function applyProviderDefault(provider, force = false) {
          const defaultModel = providerDefaults.value?.[provider]?.model || '';
          if (!defaultModel) {
            return;
          }

          if (force || !form.value.model.trim()) {
            form.value.model = defaultModel;
          }
        }

        async function checkAuth() {
          try {
            const { data } = await axios.get('/api/check-auth/');
            isLoggedIn.value = Boolean(data.authenticated);
          } catch (error) {
            showStatus('鉴权状态检查失败，请刷新后重试。', 'error', true);
          }
        }

        async function loadPublicConfig() {
          try {
            const { data } = await axios.get('/api/public-config/');
            providerDefaults.value = data.providers || {};
            applyProviderDefault(form.value.provider, true);
          } catch (error) {
            showStatus('默认模型配置加载失败。', 'error', true);
          }
        }

        async function handleLogin() {
          if (!loginPassword.value) {
            showStatus('请输入管理员密码。', 'error', true);
            return;
          }

          loading.value.auth = true;
          try {
            await axios.post('/api/login/', { password: loginPassword.value });
            loginPassword.value = '';
            isLoggedIn.value = true;
            showStatus('登录成功。', 'success');
          } catch (error) {
            showStatus(error.response?.data?.error || '登录失败。', 'error', true);
          } finally {
            loading.value.auth = false;
          }
        }

        async function handleLogout() {
          try {
            await axios.post('/api/logout/');
            isLoggedIn.value = false;
            showStatus('已退出登录。', 'success');
          } catch (error) {
            showStatus(error.response?.data?.error || '退出登录失败。', 'error', true);
          }
        }

        async function handleGenerate() {
          if (!form.value.title.trim()) {
            showStatus('标题不能为空。', 'error', true);
            return;
          }

          if (!form.value.draft.trim()) {
            showStatus('草稿或写作指令不能为空。', 'error', true);
            return;
          }

          loading.value.generate = true;
          showStatus('正在请求模型生成内容...', 'info');
          try {
            const { data } = await axios.post('/api/generate/', { ...form.value });
            form.value.markdown = data.markdown || '';
            if (data.suggestedFilePath && !form.value.filePath) {
              form.value.filePath = data.suggestedFilePath;
            }
            showStatus('生成完成，请复核后发布。', 'success');
          } catch (error) {
            showStatus(error.response?.data?.error || '生成失败。', 'error', true);
          } finally {
            loading.value.generate = false;
          }
        }

        async function handlePublish() {
          if (!form.value.filePath.trim()) {
            showStatus('发布前必须填写文件路径。', 'error', true);
            return;
          }

          if (!form.value.markdown.trim()) {
            showStatus('发布内容不能为空。', 'error', true);
            return;
          }

          if (!form.value.syncToGitHub && !form.value.syncToGitee) {
            showStatus('请至少勾选一个发布目标（GitHub 或 Gitee）。', 'error', true);
            return;
          }

          loading.value.publish = true;
          showStatus('正在发布到仓库...', 'info');
          try {
            const { data } = await axios.post('/api/publish/', { ...form.value });
            const links = [data.urls?.github, data.urls?.gitee].filter(Boolean).join(' | ');
            showStatus(`发布成功。${links ? ` ${links}` : ''}`, 'success', false, links ? 8000 : 5000);
          } catch (error) {
            showStatus(error.response?.data?.error || '发布失败。', 'error', true);
          } finally {
            loading.value.publish = false;
          }
        }

        watch(() => form.value.markdown, () => {
          renderMath();
        });

        watch(() => form.value.provider, (provider) => {
          applyProviderDefault(provider, true);
        });

        watch(previewMode, async (enabled) => {
          if (enabled) {
            await renderMath();
            attachPreviewSync();
            return;
          }

          if (detachPreviewSync) {
            detachPreviewSync();
          }
        });

        onMounted(async () => {
          await loadPublicConfig();
          await checkAuth();
          await renderMath();
        });

        onBeforeUnmount(() => {
          clearStatus();
          if (detachPreviewSync) {
            detachPreviewSync();
          }
        });

        return {
          isLoggedIn,
          previewMode,
          loginPassword,
          loading,
          status,
          providerDefaults,
          form,
          renderedMarkdown,
          clearStatus,
          closePreview,
          handleLogin,
          handleLogout,
          handleGenerate,
          handlePublish,
        };
      },
    }).mount('#app');
  </script>
</body>
</html>
